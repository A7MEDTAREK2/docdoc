name: docdoc
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  dio: ^5.9.2
  equatable: ^2.0.8
  flutter_secure_storage: ^10.2.0
  dartz: ^0.10.1
  lottie: ^3.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - lib/core/assets/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "lib/core/assets/icon.png" # تأكد أن صورتك بهذا الاسم في هذا المسار
  min_sdk_android: 21